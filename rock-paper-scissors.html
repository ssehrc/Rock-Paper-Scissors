<!DOCTYPE html>
<html> 
    <head>
        <title>Rock Paper Scissors</title>
    </head>
    <body>
        <p>
            Rock Paper Scissors
        </p> <!--Step 4:-->
        <button onclick="
            playGame('rock');
        ">Rock</button>

        <button onclick="
            playGame('paper');
        ">Paper</button>

        <button onclick="
            playGame('scissors');
        ">Scissors</button>

        <p class="js-result"></p>
        <p class="js-moves"></p>
        <p class="js-score">  </p>

        <button onclick="
            score.wins = 0;
            score.losses = 0;
            score.ties = 0;
            localStorage.removeItem('score');
            updateScoreElement();
        ">Reset Score</button>

        <script>
            
            let score = JSON.parse(localStorage.getItem('score')) || {
                    wins: 0,
                    losses: 0,
                    ties: 0
                };
            
                updateScoreElement();
/*
            if(!score){
                score = {
                    wins: 0,
                    losses: 0,
                    ties: 0
                };
            }
*/
            function playGame(playerMove){
                const computerMove = pickComputerMove(); //step 1
                //step 3:
                let result = ''; 
                if(playerMove === 'scissors'){ //scissors
                    if(computerMove ==='rock'){
                        result = 'You lose.';
                    }else if(computerMove === 'paper'){
                        result = 'You win.';
                    }else if(computerMove === 'scissors'){
                        result = 'Tie.';
                    }
                }else if(playerMove === 'rock'){//rock
                    if(computerMove ==='rock'){
                        result = 'Tie';
                    }else if(computerMove === 'paper'){
                        result = 'You lose.';
                    }else if(computerMove === 'scissors'){
                        result = 'You win.';
                    }
                }else{//paper or else
                    if(computerMove ==='rock'){
                        result = 'You win.';
                    }else if(computerMove === 'paper'){
                        result = 'Tie.';
                    }else if(computerMove === 'scissors'){
                        result = 'You lose.';
                    }
                }

                if(result === 'You win.'){
                    score.wins += 1;
                }else if(result === 'Tie.'){
                    score.ties += 1;
                }else if(result === 'You lose.'){
                    score.losses += 1;
                }

                localStorage.setItem('score', JSON.stringify(score));//local stotage

                updateScoreElement();
                
                document.querySelector('.js-result').innerHTML = result;

                document.querySelector('.js-moves').innerHTML = `You -> ${playerMove} || ${computerMove} <- Computer`;
            }

            function updateScoreElement(){
                document.querySelector('.js-score').innerHTML = 
                `Wins: ${score.wins}, Losses: ${score.losses}, Ties: ${score.ties}`;
            }

            function pickComputerMove() {//step 2
                let randomNumber = Math.random();
                let computerMove = '';

                if(randomNumber < 1/3){
                    computerMove = 'rock';
                }else if(randomNumber >= 1/3 && randomNumber < 2/3){
                    computerMove = 'paper';
                }else if(randomNumber >= 2/3 && randomNumber < 1){
                    computerMove = 'scissors';
                    
                }
                return computerMove; //nothing will run after this because it return back to where the function was called
                
            }
        </script>
    </body>
</html>
