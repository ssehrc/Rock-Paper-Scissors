<!DOCTYPE html>
<html> 
    <head>
        <title>Rock Paper Scissors</title>
    </head>
    <body>
        <p>
            Rock Paper Scissors
        </p>
        <button onclick="
        const computerMove = pickComputerMove();

        let result = '';
        if(computerMove ==='rock'){
            result = 'Tie';
        }else if(computerMove === 'paper'){
            result = 'You lose.';
        }else if(computerMove === 'scissors'){
            result = 'You win.';
        }
        alert(`You picked rock. Computer picked ${computerMove}. ${result}`);
        ">Rock</button>

        <button onclick="
        const computerMove = pickComputerMove();

        let result = '';
        if(computerMove ==='rock'){
            result = 'You win.';
        }else if(computerMove === 'paper'){
            result = 'Tie.';
        }else if(computerMove === 'scissors'){
            result = 'You lose.';
        }
        alert(`You picked paper. Computer picked ${computerMove}. ${result}`);

        ">Paper</button>

        <button onclick="
        const computerMove = pickComputerMove(); // step 1: when this button is clicked the function will be called

        let result = ''; // step 3
        if(computerMove ==='rock'){
            result = 'You lose.';
        }else if(computerMove === 'paper'){
            result = 'You win.';
        }else if(computerMove === 'scissors'){
            result = 'Tie.';
        }
        alert(`You picked scissors. Computer picked ${computerMove}. ${result}`);
        ">Scissors</button>

        <script>
            function pickComputerMove() {
                let randomNumber = Math.random();
                let computerMove = '';

                if(randomNumber < 1/3){
                    computerMove = 'rock';
                }else if(randomNumber >= 1/3 && randomNumber < 2/3){
                    computerMove = 'paper';
                }else if(randomNumber >= 2/3 && randomNumber < 1){
                    computerMove = 'scissors';
                    
                }
                return computerMove; //nothing will run after this because it return back to where the function was called
                //step2: return value will then go back to the button and run the if/else statement
            }
        </script>
    </body>
</html>
